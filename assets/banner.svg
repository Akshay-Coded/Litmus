<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Litmus — molecular property prediction">
  <style>
    .bg { fill: #F5F7F6; }
    .title { fill: #12191B; }
    .tagline { fill: #45585B; }
    .ring-node { fill: #0089AB; }
    .branch-a { fill: #B23A34; }
    .branch-b { fill: #B8842A; }
    .edge { stroke: #BFCBC9; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #10161A; }
      .title { fill: #ECF2F1; }
      .tagline { fill: #B7C4C4; }
      .ring-node { fill: #0FA0C0; }
      .branch-a { fill: #C9695F; }
      .branch-b { fill: #BE8938; }
      .edge { stroke: #3A464A; }
    }
    text { font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif; }
    .tagline { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
  </style>

  <rect class="bg" width="1200" height="260" />

  <!-- litmus strip accent -->
  <rect x="60" y="72" width="90" height="6" rx="3" fill="url(#strip)" />
  <defs>
    <linearGradient id="strip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B23A34" />
      <stop offset="50%" stop-color="#B8842A" />
      <stop offset="100%" stop-color="#0089AB" />
    </linearGradient>
  </defs>

  <text x="58" y="150" class="title" font-size="72" font-weight="700">Litmus</text>
  <text x="60" y="190" class="tagline" font-size="19">Two graph neural networks — solubility &amp; Tox21 toxicity —</text>
  <text x="60" y="215" class="tagline" font-size="19">evaluated the way a chemist would insist on.</text>

  <!-- abstract molecular graph motif -->
  <g class="edge" stroke-width="2" fill="none">
    <line x1="1020" y1="130" x2="985" y2="69.4" />
    <line x1="985" y1="69.4" x2="915" y2="69.4" />
    <line x1="915" y1="69.4" x2="880" y2="130" />
    <line x1="880" y1="130" x2="915" y2="190.6" />
    <line x1="915" y1="190.6" x2="985" y2="190.6" />
    <line x1="985" y1="190.6" x2="1020" y2="130" />
    <line x1="1020" y1="130" x2="1090" y2="130" />
    <line x1="985" y1="69.4" x2="1030" y2="25" />
    <line x1="915" y1="190.6" x2="860" y2="235" />
  </g>
  <g>
    <circle class="ring-node" cx="1020" cy="130" r="7" />
    <circle class="ring-node" cx="985" cy="69.4" r="7" />
    <circle class="ring-node" cx="915" cy="69.4" r="7" />
    <circle class="ring-node" cx="880" cy="130" r="7" />
    <circle class="ring-node" cx="915" cy="190.6" r="7" />
    <circle class="ring-node" cx="985" cy="190.6" r="7" />
    <circle class="branch-a" cx="1090" cy="130" r="6" />
    <circle class="branch-b" cx="1030" cy="25" r="6" />
    <circle class="branch-a" cx="860" cy="235" r="6" />
  </g>
</svg>
